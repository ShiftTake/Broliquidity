<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account | Bro Liquidity</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="bg-[#050816] text-white font-sans flex items-center justify-center min-h-screen">
  <div class="w-full max-w-md p-8 rounded-2xl glass shadow-lg">
    <h2 class="text-3xl font-black mb-6 text-center">Create Your Account</h2>
    <button id="google-signin" class="w-full px-4 py-3 rounded-2xl bg-[#b6ff22] text-black font-black hover:scale-105 transition mb-4">Sign up with Google</button>
    <div class="mb-4 text-slate-400 font-bold text-center">or</div>
    <form id="email-auth-form" class="flex flex-col gap-3">
      <input id="email-auth-email" type="email" placeholder="Email" class="px-5 py-3 rounded-2xl bg-white text-black outline-none font-semibold w-full" required>
      <input id="email-auth-password" type="password" placeholder="Password" class="px-5 py-3 rounded-2xl bg-white text-black outline-none font-semibold w-full" required>
      <input id="email-auth-password2" type="password" placeholder="Confirm Password" class="px-5 py-3 rounded-2xl bg-white text-black outline-none font-semibold w-full" required>
      <input id="email-auth-displayname" type="text" placeholder="Username (display name)" class="px-5 py-3 rounded-2xl bg-white text-black outline-none font-semibold w-full" required>
      <button id="email-create-btn" type="submit" class="w-full px-4 py-3 rounded-2xl bg-blue-600 text-white font-bold hover:scale-105 transition">Create Account</button>
      <div id="email-auth-error" class="text-red-400 text-sm mt-2 hidden"></div>
    </form>
    <div class="mt-6 text-center text-slate-400 text-sm">
      Already have an account? <a href="login.html" class="text-[#b6ff22] underline">Login</a>
    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDd5tPj3G8Emnga-svWIASzojete6vogH0",
      authDomain: "broliquidity.firebaseapp.com",
      projectId: "broliquidity",
      storageBucket: "broliquidity.appspot.com",
      messagingSenderId: "786880915771",
      appId: "1:786880915771:web:fe103176ffde52eff06f1e",
      measurementId: "G-SBMVSQ34L6"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const googleBtn = document.getElementById('google-signin');
    const emailAuthForm = document.getElementById('email-auth-form');
    const emailInput = document.getElementById('email-auth-email');
    const passwordInput = document.getElementById('email-auth-password');
    const password2Input = document.getElementById('email-auth-password2');
    const displayNameInput = document.getElementById('email-auth-displayname');
    const emailCreateBtn = document.getElementById('email-create-btn');
    const emailAuthError = document.getElementById('email-auth-error');

    function showEmailError(msg) {
      emailAuthError.textContent = msg;
      emailAuthError.classList.remove('hidden');
    }
    function clearEmailError() {
      emailAuthError.textContent = '';
      emailAuthError.classList.add('hidden');
    }

    googleBtn.onclick = async (e) => {
      e.preventDefault();
      clearEmailError();
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        const result = await auth.signInWithPopup(provider);
        // Optionally create user profile in Firestore
        const user = result.user;
        await db.collection('profiles').doc(user.uid).set({
          username: user.displayName || user.email,
          bio: '',
          email: user.email,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        window.location.href = 'feed.html';
      } catch (err) {
        showEmailError('Google sign-in failed: ' + err.message);
      }
    };

    emailAuthForm.onsubmit = async (e) => {
      e.preventDefault();
      clearEmailError();
      if (passwordInput.value !== password2Input.value) {
        showEmailError('Passwords do not match.');
        return;
      }
      const username = displayNameInput.value.trim();
      if (!username) {
        showEmailError('Please enter a username.');
        return;
      }
      // Check for unique username
      try {
        const usernameSnap = await db.collection('profiles').where('username', '==', username).get();
        if (!usernameSnap.empty) {
          showEmailError('Username is already taken. Please choose another.');
          return;
        }
      } catch (err) {
        showEmailError('Error checking username uniqueness.');
        return;
      }
      try {
        const result = await auth.createUserWithEmailAndPassword(emailInput.value, passwordInput.value);
        const user = result.user;
        await user.updateProfile({ displayName: username });
        await db.collection('profiles').doc(user.uid).set({
          username,
          bio: '',
          email: user.email,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        window.location.href = 'feed.html';
      } catch (err) {
        showEmailError(err.message);
      }
    };
  </script>
</body>
</html>
