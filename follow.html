<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Followers & Following | BroLiquidity</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: "Inter", sans-serif; background: #f8fafc; color: #0f172a; }
    body.dark { background: #050816; color: #fff; }
    .active-tab { color: #050816; border-bottom: 4px solid #B6FF22; }
    body.dark .active-tab { color: #fff; }
    .panel { background: #fff; border: 1px solid rgba(15,23,42,.09); }
    body.dark .panel { background: #050816; border-color: rgba(255,255,255,.12); }
    .soft-card { background: rgba(15,23,42,.035); border: 1px solid rgba(15,23,42,.08); }
    body.dark .soft-card { background: rgba(255,255,255,.055); border-color: rgba(255,255,255,.10); }
  </style>
</head>
<body class="font-sans antialiased">
  <div class="min-h-screen flex flex-col items-center py-10">
    <div class="w-full max-w-md panel rounded-3xl p-6">
      <h1 class="font-black text-2xl mb-6 text-center">Followers & Following</h1>
      <div class="flex justify-center gap-6 mb-6">
        <button id="tab-followers" class="tab-btn py-2 px-4 font-bold text-lg border-b-2" data-tab="followers">Followers</button>
        <button id="tab-following" class="tab-btn py-2 px-4 font-bold text-lg border-b-2" data-tab="following">Following</button>
      </div>
      <div id="follow-list"></div>
    </div>
    <a href="feed.html" class="mt-8 text-brogreen font-black">← Back to Feed</a>
  </div>
  <script>
    // Demo data (replace with real fetch in production)
    const following = [
      { name: "wallstreetwolf", role: "Equity hot takes", avatar: "WW" },
      { name: "siegrinder", role: "Licensing grind", avatar: "SG" },
      { name: "cap_table_king", role: "Founder wealth watch", avatar: "CK" },
      { name: "exceladdict", role: "Analyst recruiting", avatar: "EA" }
    ];
    const followers = [
      { name: "optionbro", role: "Options flow", avatar: "OB" },
      { name: "macro_mike", role: "Macro takes", avatar: "MM" },
      { name: "creditqueen", role: "Private credit", avatar: "CQ" }
    ];
    function renderUserMini(u) {
      return `
        <div class="soft-card rounded-2xl p-3 mb-2 flex items-center gap-3">
          <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(u.avatar)}&background=050816&color=B6FF22" class="w-10 h-10 rounded-full border border-slate-200 dark:border-white/10" alt="">
          <div class="min-w-0">
            <div class="font-black truncate">@${u.name}</div>
            <div class="text-xs text-slate-500 truncate">${u.role}</div>
          </div>
        </div>
      `;
    }
    function renderList(tab) {
      const list = tab === 'following' ? following : followers;
      document.getElementById('follow-list').innerHTML = list.length ? list.map(renderUserMini).join('') : `<div class='text-xs text-slate-500 text-center'>No users found.</div>`;
    }
    // Tab logic
    const urlParams = new URLSearchParams(window.location.search);
    let tab = urlParams.get('tab') || 'followers';
    function setTab(newTab) {
      tab = newTab;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active-tab'));
      document.getElementById('tab-' + tab).classList.add('active-tab');
      renderList(tab);
    }
    document.getElementById('tab-followers').onclick = () => setTab('followers');
    document.getElementById('tab-following').onclick = () => setTab('following');
    setTab(tab);
  </script>
</body>
</html>
