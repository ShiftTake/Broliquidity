    // --- Search Bar Logic ---
    const searchBar = document.getElementById('search-bar');
    const searchBtn = document.getElementById('search-btn');
    const searchResults = document.getElementById('search-results');

    async function searchCommunitiesAndUsers(query) {
      if (!query.trim()) {
        searchResults.classList.add('hidden');
        searchResults.innerHTML = '';
        return;
      }
      let html = '';
      // Search communities
      const commSnap = await db.collection('communities').where('name', '>=', query).where('name', '<=', query + '\uf8ff').limit(5).get();
      if (!commSnap.empty) {
        html += '<div class="font-bold mb-1">Communities</div>';
        commSnap.forEach(doc => {
          const c = doc.data();
          html += `<div class="p-2 hover:bg-blue-100 dark:hover:bg-blue-900 rounded cursor-pointer" onclick="window.location.href='feed.html?community=${doc.id}'"><b>c/${c.name}</b> <span class='text-xs text-slate-400'>${c.description || ''}</span></div>`;
        });
      }
      // Search users
      const userSnap = await db.collection('profiles').where('displayName', '>=', query).where('displayName', '<=', query + '\uf8ff').limit(5).get();
      if (!userSnap.empty) {
        html += '<div class="font-bold mt-2 mb-1">Users</div>';
        userSnap.forEach(doc => {
          const u = doc.data();
          html += `<div class="p-2 hover:bg-blue-100 dark:hover:bg-blue-900 rounded cursor-pointer" onclick="window.location.href='profile.html?user=${doc.id}'"><b>u/${u.displayName || u.email || doc.id}</b></div>`;
        });
      }
      if (!html) html = '<div class="text-slate-400">No results found.</div>';
      searchResults.innerHTML = html;
      searchResults.classList.remove('hidden');
    }
    searchBtn.onclick = () => searchCommunitiesAndUsers(searchBar.value);
    searchBar.onkeyup = e => { if (e.key === 'Enter') searchCommunitiesAndUsers(searchBar.value); };

    // --- Post Subject/Label Logic ---
    const postSubject = document.getElementById('post-subject');
    const postLabel = document.getElementById('post-label');
    const labelOptions = {
      stocks: ['General', 'Analysis', 'News', 'Question'],
      options: ['Strategy', 'Trade', 'Education', 'Question'],
      crypto: ['General', 'Altcoins', 'NFT', 'Question'],
      jobs: ['Hiring', 'Looking', 'Advice', 'Question'],
      careers: ['Advice', 'Experience', 'Question'],
      other: ['General', 'Question']
    };
    postSubject.onchange = function() {
      const val = postSubject.value;
      postLabel.innerHTML = '<option value="">Select Label</option>';
      if (labelOptions[val]) {
        labelOptions[val].forEach(lab => {
          const opt = document.createElement('option');
          opt.value = lab;
          opt.textContent = lab;
          postLabel.appendChild(opt);
        });
      }
    };

    // --- Post Form Validation Update ---
    const postForm = document.getElementById('post-form');
    postForm.onsubmit = async function(e) {
      e.preventDefault();
      const errorDiv = document.getElementById('post-error');
      errorDiv.classList.add('hidden');
      const subject = postSubject.value;
      const label = postLabel.value;
      const content = document.getElementById('post-content').value;
      const community = document.getElementById('community-select').value;
      if (!community) {
        errorDiv.textContent = 'Select a community.';
        errorDiv.classList.remove('hidden');
        return;
      }
      if (!subject) {
        errorDiv.textContent = 'Select a subject.';
        errorDiv.classList.remove('hidden');
        return;
      }
      if (!label) {
        errorDiv.textContent = 'Select a label.';
        errorDiv.classList.remove('hidden');
        return;
      }
      if (!content.trim()) {
        errorDiv.textContent = 'Post content cannot be empty.';
        errorDiv.classList.remove('hidden');
        return;
      }
      // Post logic here (add to Firestore, etc.)
      // ...existing code...
    };

    // --- Theme toggle ---
    const themeToggle = document.getElementById('theme-toggle');

    function setTheme(theme) {
      if (theme === 'light') {
        document.documentElement.classList.remove('dark');
        document.body.classList.remove('dark');
        document.body.classList.add('light');
        themeToggle.textContent = '☀️';
      } else {
        document.documentElement.classList.add('dark');
        document.body.classList.remove('light');
        document.body.classList.add('dark');
        themeToggle.textContent = '🌙';
      }
      localStorage.setItem('theme', theme);
    }
    themeToggle.onclick = () => {
      const current = localStorage.getItem('theme') === 'light' ? 'dark' : 'light';
      setTheme(current);
    };
    setTheme(localStorage.getItem('theme') || 'dark');

    // --- Profile Modal Logic ---
    const profileBtn = document.getElementById('profile-btn');
    const profileModal = document.getElementById('profile-modal');
    const closeProfile = document.getElementById('close-profile');
    const profilePhoto = document.getElementById('profile-photo');
    const photoUpload = document.getElementById('photo-upload');
    const profileUsername = document.getElementById('profile-username');
    const profileBio = document.getElementById('profile-bio');
    const saveProfile = document.getElementById('save-profile');
    const logoutBtn = document.getElementById('logout-btn');

    let currentUser = null;
    let userProfile = {};

    profileBtn.onclick = async () => {
      profileModal.classList.remove('hidden');
      currentUser = auth.currentUser;
      if (!currentUser) return;
      profileUsername.value = currentUser.displayName || currentUser.email;
      // Load profile from Firestore
      const profSnap = await db.collection('profiles').doc(currentUser.uid).get();
      userProfile = profSnap.exists ? profSnap.data() : {};
      profileBio.value = userProfile.bio || '';
      let photoUrl = '';
      if (userProfile.photoURL) {
        photoUrl = userProfile.photoURL;
      } else if (currentUser.photoURL) {
        photoUrl = currentUser.photoURL;
      } else {
        photoUrl = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(profileUsername.value);
      }
      profilePhoto.src = photoUrl;
      // Also update nav profile image
      document.getElementById('profile-btn').src = photoUrl;
    };
    closeProfile.onclick = () => profileModal.classList.add('hidden');
    window.onclick = e => { if (e.target === profileModal) profileModal.classList.add('hidden'); };

    photoUpload.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        profilePhoto.src = reader.result;
      };
      reader.readAsDataURL(file);
      // Upload to Firebase Storage
      const storageRef = firebase.storage().ref('profile_photos/' + currentUser.uid);
      await storageRef.put(file);
      const url = await storageRef.getDownloadURL();
      await db.collection('profiles').doc(currentUser.uid).set({ photoURL: url }, { merge: true });
      await currentUser.updateProfile({ photoURL: url });
    };

    saveProfile.onclick = async () => {
      await db.collection('profiles').doc(currentUser.uid).set({ bio: profileBio.value }, { merge: true });
      userProfile.bio = profileBio.value;
      profileModal.classList.add('hidden');
    };

    logoutBtn.onclick = async () => {
      await auth.signOut();
      window.location.href = 'login.html';
    };
    auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.href = 'login.html';
      }
      // Set nav profile image on login
      let photoUrl = '';
      if (user) {
        const profRef = db.collection('profiles').doc(user.uid);
        profRef.get().then(profSnap => {
          if (profSnap.exists && profSnap.data().photoURL) {
            photoUrl = profSnap.data().photoURL;
          } else if (user.photoURL) {
            photoUrl = user.photoURL;
          } else {
            photoUrl = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.displayName || user.email);
          }
          document.getElementById('profile-btn').src = photoUrl;
        });
      }
    });
    // --- Profile Modal Theme Toggle ---
    const profileThemeToggle = document.getElementById('profile-theme-toggle');
    function updateProfileThemeBtn() {
      const theme = localStorage.getItem('theme') || 'dark';
      profileThemeToggle.textContent = theme === 'light' ? '☀️' : '🌙';
    }
    updateProfileThemeBtn();
    profileThemeToggle.onclick = () => {
      const current = localStorage.getItem('theme') === 'light' ? 'dark' : 'light';
      setTheme(current);
      updateProfileThemeBtn();
    };

    // --- Logout ---
    document.getElementById('logout-btn').onclick = async () => {
      await auth.signOut();
      window.location.href = 'login.html';
    };

    // --- Community Creation ---
    const openCreateCommunity = document.getElementById('open-create-community');
    const createCommunityModal = document.getElementById('create-community-modal');
    const closeCreateCommunity = document.getElementById('close-create-community');
    const createCommunityBtn = document.getElementById('create-community-btn');
    const communityName = document.getElementById('community-name');
    const communityDesc = document.getElementById('community-desc');
    const communityImage = document.getElementById('community-image');
    const communityCreateError = document.getElementById('community-create-error');
    const communitySelect = document.getElementById('community-select');

    openCreateCommunity.onclick = () => createCommunityModal.classList.remove('hidden');
    closeCreateCommunity.onclick = () => createCommunityModal.classList.add('hidden');
    window.onclick = e => { if (e.target === createCommunityModal) createCommunityModal.classList.add('hidden'); };

    async function loadCommunities() {
      communitySelect.innerHTML = '<option value="">Select a Community</option>';
      const snapshot = await db.collection('communities').get();
      snapshot.forEach(doc => {
        const c = doc.data();
        const opt = document.createElement('option');
        opt.value = doc.id;
        opt.textContent = c.name;
        communitySelect.appendChild(opt);
      });
    }
    loadCommunities();

    createCommunityBtn.onclick = async () => {
      communityCreateError.classList.add('hidden');
      if (!communityName.value.trim()) {
        communityCreateError.textContent = 'Community name required.';
        communityCreateError.classList.remove('hidden');
        return;
      }
      let imageUrl = '';
      if (communityImage.files[0]) {
        const storageRef = firebase.storage().ref('community_images/' + Date.now() + '_' + communityImage.files[0].name);
        await storageRef.put(communityImage.files[0]);
        imageUrl = await storageRef.getDownloadURL();
      }
      const ref = await db.collection('communities').add({
        name: communityName.value.trim(),
        description: communityDesc.value.trim(),
        image: imageUrl,
        creator: auth.currentUser.uid,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        moderators: [auth.currentUser.uid],
        members: [auth.currentUser.uid]
      });
      createCommunityModal.classList.add('hidden');
      communityName.value = '';
      communityDesc.value = '';
      communityImage.value = '';
      await loadCommunities();
      communitySelect.value = ref.id;
    };

    // --- Post creation (restricted to selected community) ---
    const postForm = document.getElementById('post-form');
    const postContent = document.getElementById('post-content');

    function showPostError(msg) {
      postError.textContent = msg;
      postError.classList.remove('hidden');
    }
    function clearPostError() {
      postError.textContent = '';
      postError.classList.add('hidden');
    }

    postForm.onsubmit = async (e) => {
      e.preventDefault();
      clearPostError();
      const user = auth.currentUser;
      if (!user) {
        showPostError('You must be signed in to post.');
        return;
      }
      if (!communitySelect.value) {
        showPostError('Select a community to post in.');
        return;
      }
      if (!postContent.value.trim()) {
        showPostError('Post content cannot be empty.');
        return;
      }
      let username = user.displayName;
      if (!username) {
        const emailPrefix = user.email ? user.email.split('@')[0] : 'user';
        username = emailPrefix + Math.floor(Math.random() * 10000);
        await user.updateProfile({ displayName: username });
        await db.collection('profiles').doc(user.uid).set({ username }, { merge: true });
      }
      // Check if user is a member of the community
      const commSnap = await db.collection('communities').doc(communitySelect.value).get();
      const comm = commSnap.data();
      if (!comm.members.includes(user.uid)) {
        showPostError('You must join this community to post.');
        return;

      try {
        await db.collection('posts').add({
          content: postContent.value,
          community: communitySelect.value,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),

          bullish: 0,

          li.innerHTML = `
            <div class="text-xs text-slate-400 mb-1">${post.category.toUpperCase()} • ${post.author}</div>
            <div class="text-white mb-2">${post.content}</div>
            <div class="text-xs text-slate-500 mb-1">${new Date(post.createdAt.seconds * 1000).toLocaleString()}</div>
            <div class="flex gap-3 items-center mt-2">
              <button class="bullish-btn flex items-center gap-1 px-2 py-1 rounded-lg bg-green-900/30 hover:bg-green-600/30 text-green-300 font-bold text-xs" data-id="${post.id}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 15 12 9 18 15" /><line x1="12" y1="9" x2="12" y2="21" /></svg>
                Bullish <span>${post.bullish || 0}</span>
              </button>
              <button class="bearish-btn flex items-center gap-1 px-2 py-1 rounded-lg bg-red-900/30 hover:bg-red-600/30 text-red-300 font-bold text-xs" data-id="${post.id}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9" /><line x1="12" y1="15" x2="12" y2="3" /></svg>
                Bearish <span>${post.bearish || 0}</span>
              </button>
            </div>
          `;
          postsList.appendChild(li);
        });
        return;
      }
      posts.forEach(post => {
        const li = document.createElement('li');
        li.className = 'glass p-5 rounded-xl';
        li.innerHTML = `
          <div class="text-xs text-slate-400 mb-1">${post.category.toUpperCase()} • ${post.author}</div>
          <div class="text-white mb-2">${post.content}</div>
          <div class="text-xs text-slate-500 mb-1">${post.createdAt ? new Date(post.createdAt.seconds * 1000).toLocaleString() : ''}</div>
          <div class="flex gap-3 items-center mt-2">
            <button class="bullish-btn flex items-center gap-1 px-2 py-1 rounded-lg bg-green-900/30 hover:bg-green-600/30 text-green-300 font-bold text-xs" data-id="${post.id}">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 15 12 9 18 15" /><line x1="12" y1="9" x2="12" y2="21" /></svg>
              Bullish <span>${post.bullish || 0}</span>
            </button>
            <button class="bearish-btn flex items-center gap-1 px-2 py-1 rounded-lg bg-red-900/30 hover:bg-red-600/30 text-red-300 font-bold text-xs" data-id="${post.id}">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9" /><line x1="12" y1="15" x2="12" y2="3" /></svg>
              Bearish <span>${post.bearish || 0}</span>
            </button>
          </div>
        `;
        postsList.appendChild(li);
      });
      // Add event listeners for voting
      document.querySelectorAll('.bullish-btn').forEach(btn => {
        btn.onclick = async (e) => {
          const id = btn.getAttribute('data-id');
          const postRef = db.collection('posts').doc(id);
          await postRef.update({ bullish: firebase.firestore.FieldValue.increment(1) });
        };
      });
      document.querySelectorAll('.bearish-btn').forEach(btn => {
        btn.onclick = async (e) => {
          const id = btn.getAttribute('data-id');
          const postRef = db.collection('posts').doc(id);
          await postRef.update({ bearish: firebase.firestore.FieldValue.increment(1) });
        };
      });
    }

    let unsubscribe = null;
    function subscribeToPosts() {
      if (unsubscribe) unsubscribe();
      let q = db.collection('posts');
      const filter = filterCategory.value;
      if (filter !== 'all') {
        q = q.where('category', '==', filter);
      }
      q = q.orderBy('createdAt', 'desc');
      unsubscribe = q.onSnapshot(snapshot => {
        let posts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        // Sorting
        if (sortPosts.value === 'bullish') {
          posts = posts.sort((a, b) => (b.bullish || 0) - (a.bullish || 0));
        } else if (sortPosts.value === 'bearish') {
          posts = posts.sort((a, b) => (b.bearish || 0) - (a.bearish || 0));
        } else {
          posts = posts.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
        }
        renderPosts(posts);
        loadingDiv.style.display = 'none';
      });
    }
    filterCategory.onchange = subscribeToPosts;
    sortPosts.onchange = subscribeToPosts;
    subscribeToPosts();
  </script>
</body>
</html>
