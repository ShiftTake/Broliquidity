<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bro Liquidity Feed</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body.light {
      background: #fff !important;
      color: #181a20 !important;
    }
    body.dark {
      background: #050816 !important;
      color: #fff !important;
    }
    .glass {
      background: rgba(8, 13, 35, 0.78);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    body.light .glass {
      background: rgba(255,255,255,0.85);
      border: 1px solid rgba(0,0,0,0.08);
      color: #181a20;
    }
    body.light .dark\:bg-\[\#181a20\] {
      background: #fff !important;
    }
    body.light .dark\:text-white {
      color: #181a20 !important;
    }
    body.light .dark\:bg-slate-800 {
      background: #f3f4f6 !important;
    }
    body.light .dark\:bg-black\/60 {
      background: #fff !important;
    }
    body.light .dark\:border-\[\#b6ff22\] {
      border-color: #b6ff22 !important;
    }
  </style>
</head>
<body class="font-sans min-h-screen dark:bg-[#050816] dark:text-white bg-white text-[#181a20]">
  <header class="px-6 py-5">
    <nav class="max-w-7xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img src="mainlogo.png" alt="Bro Liquidity Logo" class="w-14 h-14 rounded-2xl object-cover">
        <div>
          <h1 class="font-black text-xl tracking-tight">Bro Liquidity</h1>
          <p class="text-xs text-slate-400">Trades. Licenses. Careers.</p>
        </div>
      </div>
      <div class="flex items-center gap-8 text-sm font-semibold text-slate-300">
        <a href="index.html#features" class="hover:text-[#b6ff22]">Features</a>
        <a href="feed.html" class="hover:text-[#b6ff22]">Feed</a>
        <a href="index.html" class="hover:text-[#b6ff22]">Home</a>
        <button id="theme-toggle" class="px-4 py-2 rounded-2xl bg-slate-700 text-white font-bold hover:scale-105 transition">🌙</button>
        <button id="profile-btn" class="px-4 py-2 rounded-2xl bg-blue-600 text-white font-bold hover:scale-105 transition">Profile</button>
  <!-- User Profile Modal -->
  <div id="profile-modal" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 hidden">
    <div class="bg-white dark:bg-[#181a20] text-black dark:text-white rounded-2xl p-8 w-full max-w-md relative">
      <button id="close-profile" class="absolute top-3 right-3 text-2xl">&times;</button>
      <h2 class="text-2xl font-black mb-4">Your Profile</h2>
      <div class="flex flex-col items-center gap-4">
        <img id="profile-photo" src="" alt="Profile Photo" class="w-24 h-24 rounded-full object-cover border-4 border-[#b6ff22]" style="background:#eee;" />
        <input type="file" id="photo-upload" accept="image/*" class="mb-2" />
        <input id="profile-username" class="px-4 py-2 rounded-lg bg-slate-200 dark:bg-slate-800 text-black dark:text-white font-semibold w-full" disabled />
        <textarea id="profile-bio" class="px-4 py-2 rounded-lg bg-slate-200 dark:bg-slate-800 text-black dark:text-white font-semibold w-full" rows="3" placeholder="Add a short bio..."></textarea>
        <button id="save-profile" class="px-6 py-2 rounded-xl bg-[#b6ff22] text-black font-bold hover:scale-105 transition">Save</button>
        <button id="logout-btn" class="w-full px-4 py-2 rounded-2xl bg-red-600 text-white font-bold hover:scale-105 transition mt-2">Logout</button>
      </div>
    </div>
  </div>
      </div>
    </nav>
  </header>
  <main class="max-w-3xl mx-auto py-10 px-4">
    <section class="mb-10">
      <form id="post-form" class="glass p-6 rounded-2xl mb-8 flex flex-col gap-3">
        <h3 class="text-xl font-bold mb-2">Start a Conversation</h3>
        <select id="post-category" class="mb-2 px-3 py-2 rounded-lg bg-slate-900 border border-slate-700 text-white focus:outline-none">
          <option value="stocks">Stocks</option>
          <option value="options">Options</option>
          <option value="crypto">Crypto</option>
          <option value="jobs">Jobs</option>
          <option value="careers">Careers</option>
          <option value="other">Other</option>
        </select>
        <textarea id="post-content" placeholder="What's on your mind?" class="w-full mb-2 px-3 py-2 rounded-lg bg-slate-900 border border-slate-700 text-white focus:outline-none" rows="3"></textarea>
        <div id="post-error" class="text-red-400 text-sm hidden"></div>
        <button type="submit" class="px-6 py-2 rounded-xl bg-[#b6ff22] text-black font-bold hover:scale-105 transition">Post</button>
      </form>
    </section>
    <section>
      <div class="flex flex-wrap items-center gap-3 mb-4">
        <h3 class="text-lg font-bold">Recent Posts</h3>
        <select id="filter-category" class="px-3 py-1 rounded-lg bg-slate-900 border border-slate-700 text-white text-sm focus:outline-none">
          <option value="all">All</option>
          <option value="stocks">Stocks</option>
          <option value="options">Options</option>
          <option value="crypto">Crypto</option>
          <option value="jobs">Jobs</option>
          <option value="careers">Careers</option>
          <option value="other">Other</option>
        </select>
        <select id="sort-posts" class="px-3 py-1 rounded-lg bg-slate-900 border border-slate-700 text-white text-sm focus:outline-none">
          <option value="newest">Newest</option>
          <option value="bullish">Most Bullish</option>
          <option value="bearish">Most Bearish</option>
        </select>
      </div>
      <ul id="posts-list" class="space-y-4"></ul>
      <div id="loading" class="text-slate-400 mt-4">Loading...</div>
    </section>
  </main>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDd5tPj3G8Emnga-svWIASzojete6vogH0",
      authDomain: "broliquidity.firebaseapp.com",
      projectId: "broliquidity",
      storageBucket: "broliquidity.appspot.com",
      messagingSenderId: "786880915771",
      appId: "1:786880915771:web:fe103176ffde52eff06f1e",
      measurementId: "G-SBMVSQ34L6"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // --- Theme toggle ---
    const themeToggle = document.getElementById('theme-toggle');

    function setTheme(theme) {
      if (theme === 'light') {
        document.documentElement.classList.remove('dark');
        document.body.classList.remove('dark');
        document.body.classList.add('light');
        themeToggle.textContent = '☀️';
      } else {
        document.documentElement.classList.add('dark');
        document.body.classList.remove('light');
        document.body.classList.add('dark');
        themeToggle.textContent = '🌙';
      }
      localStorage.setItem('theme', theme);
    }
    themeToggle.onclick = () => {
      const current = localStorage.getItem('theme') === 'light' ? 'dark' : 'light';
      setTheme(current);
    };
    setTheme(localStorage.getItem('theme') || 'dark');

    // --- Profile Modal Logic ---
    const profileBtn = document.getElementById('profile-btn');
    const profileModal = document.getElementById('profile-modal');
    const closeProfile = document.getElementById('close-profile');
    const profilePhoto = document.getElementById('profile-photo');
    const photoUpload = document.getElementById('photo-upload');
    const profileUsername = document.getElementById('profile-username');
    const profileBio = document.getElementById('profile-bio');
    const saveProfile = document.getElementById('save-profile');
    const logoutBtn = document.getElementById('logout-btn');

    let currentUser = null;
    let userProfile = {};

    profileBtn.onclick = async () => {
      profileModal.classList.remove('hidden');
      currentUser = auth.currentUser;
      if (!currentUser) return;
      profileUsername.value = currentUser.displayName || currentUser.email;
      // Load profile from Firestore
      const profSnap = await db.collection('profiles').doc(currentUser.uid).get();
      userProfile = profSnap.exists ? profSnap.data() : {};
      profileBio.value = userProfile.bio || '';
      if (userProfile.photoURL) {
        profilePhoto.src = userProfile.photoURL;
      } else if (currentUser.photoURL) {
        profilePhoto.src = currentUser.photoURL;
      } else {
        profilePhoto.src = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(profileUsername.value);
      }
    };
    closeProfile.onclick = () => profileModal.classList.add('hidden');
    window.onclick = e => { if (e.target === profileModal) profileModal.classList.add('hidden'); };

    photoUpload.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        profilePhoto.src = reader.result;
      };
      reader.readAsDataURL(file);
      // Upload to Firebase Storage
      const storageRef = firebase.storage().ref('profile_photos/' + currentUser.uid);
      await storageRef.put(file);
      const url = await storageRef.getDownloadURL();
      await db.collection('profiles').doc(currentUser.uid).set({ photoURL: url }, { merge: true });
      await currentUser.updateProfile({ photoURL: url });
    };

    saveProfile.onclick = async () => {
      await db.collection('profiles').doc(currentUser.uid).set({ bio: profileBio.value }, { merge: true });
      userProfile.bio = profileBio.value;
      profileModal.classList.add('hidden');
    };

    logoutBtn.onclick = async () => {
      await auth.signOut();
      window.location.href = 'login.html';
    };
    auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.href = 'login.html';
      }
    });

    // --- Logout ---
    document.getElementById('logout-btn').onclick = async () => {
      await auth.signOut();
      window.location.href = 'login.html';
    };

    // --- Post creation ---
    const postForm = document.getElementById('post-form');
    const postContent = document.getElementById('post-content');
    const postCategory = document.getElementById('post-category');
    const postError = document.getElementById('post-error');

    function showPostError(msg) {
      postError.textContent = msg;
      postError.classList.remove('hidden');
    }
    function clearPostError() {
      postError.textContent = '';
      postError.classList.add('hidden');
    }

    postForm.onsubmit = async (e) => {
      e.preventDefault();
      clearPostError();
      const user = auth.currentUser;
      if (!user) {
        showPostError('You must be signed in to post.');
        return;
      }
      if (!postContent.value.trim()) {
        showPostError('Post content cannot be empty.');
        return;
      }
      let username = user.displayName;
      if (!username) {
        // Auto-generate username if not set
        const emailPrefix = user.email ? user.email.split('@')[0] : 'user';
        username = emailPrefix + Math.floor(Math.random() * 10000);
        await user.updateProfile({ displayName: username });
        await db.collection('profiles').doc(user.uid).set({ username }, { merge: true });
      }
      try {
        await db.collection('posts').add({
          content: postContent.value,
          category: postCategory.value,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          author: username,
          bullish: 0,
          bearish: 0
        });
        postContent.value = '';
        postCategory.value = 'stocks';
      } catch (err) {
        showPostError('Failed to post. Try again.');
      }
    };

    // --- Fetch and render posts ---
    const postsList = document.getElementById('posts-list');
    const loadingDiv = document.getElementById('loading');
    const filterCategory = document.getElementById('filter-category');
    const sortPosts = document.getElementById('sort-posts');

    function renderPosts(posts) {
      postsList.innerHTML = '';
      if (posts.length === 0) {
        // Dummy data for demonstration
        const dummyPosts = [
          {
            id: '1',
            category: 'stocks',
            author: 'wallstreetwolf',
            content: 'AAPL earnings beat expectations! 🚀 Who else is bullish for Q3?',
            createdAt: { seconds: Math.floor(Date.now() / 1000) - 3600 },
            bullish: 23,
            bearish: 2
          },
          {
            id: '2',
            category: 'crypto',
            author: 'cryptoking',
            content: 'ETH 2.0 is finally here. Are you staking or selling?',
            createdAt: { seconds: Math.floor(Date.now() / 1000) - 7200 },
            bullish: 15,
            bearish: 5
          },
          {
            id: '3',
            category: 'jobs',
            author: 'financerecruiter',
            content: 'Hiring for a junior analyst role in NYC. DM for details!',
            createdAt: { seconds: Math.floor(Date.now() / 1000) - 10800 },
            bullish: 8,
            bearish: 0
          },
          {
            id: '4',
            category: 'options',
            author: 'optionstrader',
            content: 'SPY 450c for next week. Who’s in?',
            createdAt: { seconds: Math.floor(Date.now() / 1000) - 5400 },
            bullish: 12,
            bearish: 3
          },
          {
            id: '5',
            category: 'careers',
            author: 'cfaprepper',
            content: 'Passed CFA Level 2! Any tips for Level 3?',
            createdAt: { seconds: Math.floor(Date.now() / 1000) - 18000 },
            bullish: 10,
            bearish: 1
          }
        ];
        dummyPosts.forEach(post => {
          const li = document.createElement('li');
          li.className = 'glass p-5 rounded-xl';
          li.innerHTML = `
            <div class="text-xs text-slate-400 mb-1">${post.category.toUpperCase()} • ${post.author}</div>
            <div class="text-white mb-2">${post.content}</div>
            <div class="text-xs text-slate-500 mb-1">${new Date(post.createdAt.seconds * 1000).toLocaleString()}</div>
            <div class="flex gap-3 items-center mt-2">
              <button class="bullish-btn flex items-center gap-1 px-2 py-1 rounded-lg bg-green-900/30 hover:bg-green-600/30 text-green-300 font-bold text-xs" data-id="${post.id}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 15 12 9 18 15" /><line x1="12" y1="9" x2="12" y2="21" /></svg>
                Bullish <span>${post.bullish || 0}</span>
              </button>
              <button class="bearish-btn flex items-center gap-1 px-2 py-1 rounded-lg bg-red-900/30 hover:bg-red-600/30 text-red-300 font-bold text-xs" data-id="${post.id}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9" /><line x1="12" y1="15" x2="12" y2="3" /></svg>
                Bearish <span>${post.bearish || 0}</span>
              </button>
            </div>
          `;
          postsList.appendChild(li);
        });
        return;
      }
      posts.forEach(post => {
        const li = document.createElement('li');
        li.className = 'glass p-5 rounded-xl';
        li.innerHTML = `
          <div class="text-xs text-slate-400 mb-1">${post.category.toUpperCase()} • ${post.author}</div>
          <div class="text-white mb-2">${post.content}</div>
          <div class="text-xs text-slate-500 mb-1">${post.createdAt ? new Date(post.createdAt.seconds * 1000).toLocaleString() : ''}</div>
          <div class="flex gap-3 items-center mt-2">
            <button class="bullish-btn flex items-center gap-1 px-2 py-1 rounded-lg bg-green-900/30 hover:bg-green-600/30 text-green-300 font-bold text-xs" data-id="${post.id}">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 15 12 9 18 15" /><line x1="12" y1="9" x2="12" y2="21" /></svg>
              Bullish <span>${post.bullish || 0}</span>
            </button>
            <button class="bearish-btn flex items-center gap-1 px-2 py-1 rounded-lg bg-red-900/30 hover:bg-red-600/30 text-red-300 font-bold text-xs" data-id="${post.id}">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9" /><line x1="12" y1="15" x2="12" y2="3" /></svg>
              Bearish <span>${post.bearish || 0}</span>
            </button>
          </div>
        `;
        postsList.appendChild(li);
      });
      // Add event listeners for voting
      document.querySelectorAll('.bullish-btn').forEach(btn => {
        btn.onclick = async (e) => {
          const id = btn.getAttribute('data-id');
          const postRef = db.collection('posts').doc(id);
          await postRef.update({ bullish: firebase.firestore.FieldValue.increment(1) });
        };
      });
      document.querySelectorAll('.bearish-btn').forEach(btn => {
        btn.onclick = async (e) => {
          const id = btn.getAttribute('data-id');
          const postRef = db.collection('posts').doc(id);
          await postRef.update({ bearish: firebase.firestore.FieldValue.increment(1) });
        };
      });
    }

    let unsubscribe = null;
    function subscribeToPosts() {
      if (unsubscribe) unsubscribe();
      let q = db.collection('posts');
      const filter = filterCategory.value;
      if (filter !== 'all') {
        q = q.where('category', '==', filter);
      }
      q = q.orderBy('createdAt', 'desc');
      unsubscribe = q.onSnapshot(snapshot => {
        let posts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        // Sorting
        if (sortPosts.value === 'bullish') {
          posts = posts.sort((a, b) => (b.bullish || 0) - (a.bullish || 0));
        } else if (sortPosts.value === 'bearish') {
          posts = posts.sort((a, b) => (b.bearish || 0) - (a.bearish || 0));
        } else {
          posts = posts.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
        }
        renderPosts(posts);
        loadingDiv.style.display = 'none';
      });
    }
    filterCategory.onchange = subscribeToPosts;
    sortPosts.onchange = subscribeToPosts;
    subscribeToPosts();
  </script>
</body>
</html>
