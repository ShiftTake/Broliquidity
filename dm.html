<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Direct Messages | BroLiquidity</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: "Inter", sans-serif; background: #f8fafc; color: #0f172a; }
    body.dark { background: #050816; color: #fff; }
    .panel { background: #fff; border: 1px solid rgba(15,23,42,.09); }
    body.dark .panel { background: #050816; border-color: rgba(255,255,255,.12); }
    .soft-card { background: rgba(15,23,42,.035); border: 1px solid rgba(15,23,42,.08); }
    body.dark .soft-card { background: rgba(255,255,255,.055); border-color: rgba(255,255,255,.10); }
    .active-user { background: #B6FF22; color: #050816; }
    .message-me { background: #B6FF22; color: #050816; align-self: flex-end; }
    .message-them { background: #e5e7eb; color: #050816; align-self: flex-start; }
    body.dark .message-them { background: #222b3a; color: #fff; }
    body.dark .message-me { background: #B6FF22; color: #050816; }
  </style>
</head>
<body class="font-sans antialiased">
  <div class="min-h-screen flex flex-col items-center py-10">
    <div class="w-full max-w-3xl panel rounded-3xl p-0 flex overflow-hidden">
      <!-- User List -->
      <aside class="w-64 border-r border-slate-200 dark:border-white/10 bg-slate-50 dark:bg-[#10172a] p-4">
        <h2 class="font-black text-lg mb-4">Direct Messages</h2>
        <div id="dm-user-list"></div>
      </aside>
      <!-- Chat Area -->
      <main class="flex-1 flex flex-col">
        <div class="flex-1 p-6 overflow-y-auto" id="dm-chat"></div>
        <form id="dm-form" class="flex gap-2 p-4 border-t border-slate-200 dark:border-white/10">
          <input id="dm-input" class="flex-1 px-4 py-3 rounded-2xl bg-white dark:bg-white/8 border border-slate-200 dark:border-white/10 outline-none text-sm font-semibold" placeholder="Type a message..." autocomplete="off" />
          <button type="submit" class="px-6 py-3 rounded-2xl bg-brogreen text-black font-black">Send</button>
        </form>
      </main>
    </div>
    <a href="feed.html" class="mt-8 text-brogreen font-black">← Back to Feed</a>
  </div>
  <script>
    // Demo users and messages
    const users = [
      { name: "wallstreetwolf", avatar: "WW" },
      { name: "siegrinder", avatar: "SG" },
      { name: "cap_table_king", avatar: "CK" },
      { name: "exceladdict", avatar: "EA" }
    ];
    const messages = {
      wallstreetwolf: [
        { from: "me", text: "Hey, what are your thoughts on $NVDA?" },
        { from: "them", text: "Letting the winners run. Gravity got laid off!" }
      ],
      siegrinder: [
        { from: "me", text: "How's the Series 7 grind?" },
        { from: "them", text: "Covered calls make sense until the exam starts yelling." }
      ],
      cap_table_king: [
        { from: "me", text: "Any founder tips?" },
        { from: "them", text: "Own more than you sell." }
      ],
      exceladdict: [
        { from: "me", text: "Got a superday for an analyst role. Advice?" },
        { from: "them", text: "Know your DCF and comps cold." }
      ]
    };
    let activeUser = users[0].name;
    function renderUserList() {
      document.getElementById('dm-user-list').innerHTML = users.map(u => `
        <button class="w-full flex items-center gap-3 p-2 rounded-xl mb-2 soft-card font-bold ${u.name === activeUser ? 'active-user' : ''}" onclick="setActiveUser('${u.name}')">
          <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(u.avatar)}&background=050816&color=B6FF22" class="w-8 h-8 rounded-full" alt="">
          <span>@${u.name}</span>
        </button>
      `).join('');
    }
    function renderChat() {
      const chat = messages[activeUser] || [];
      document.getElementById('dm-chat').innerHTML = chat.map(m => `
        <div class="max-w-[70%] my-2 px-4 py-3 rounded-2xl text-sm font-semibold ${m.from === 'me' ? 'message-me' : 'message-them'}">${m.text}</div>
      `).join('');
      setTimeout(() => { document.getElementById('dm-chat').scrollTop = 99999; }, 10);
    }
    window.setActiveUser = function(name) {
      activeUser = name;
      renderUserList();
      renderChat();
    }
    document.getElementById('dm-form').onsubmit = function(e) {
      e.preventDefault();
      const input = document.getElementById('dm-input');
      const text = input.value.trim();
      if (!text) return;
      messages[activeUser] = messages[activeUser] || [];
      messages[activeUser].push({ from: 'me', text });
      input.value = '';
      renderChat();
    };
    renderUserList();
    renderChat();
  </script>
</body>
</html>
