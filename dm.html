<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Direct Messages | BroLiquidity</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Inter", "sans-serif"] },
          colors: {
            broblue: "#125CFF",
            brogreen: "#B6FF22",
            ink: "#050816",
            panel: "#0B1024"
          }
        }
      }
    };
  </script>
    <style>
      :root { color-scheme: light; }
      body {
        font-family: "Inter", sans-serif;
        color: #0f172a;
        background: #f8fafc;
      }
      .panel {
        background: #ffffff;
        border: 1px solid rgba(15,23,42,.09);
      }
      .soft-card {
        background: rgba(15,23,42,.025);
        border: 1px solid rgba(15,23,42,.06);
      }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col bg-[#f8fafc] text-[#0f172a] dark:bg-[#050816] dark:text-white">

  <header class="border-b border-slate-200 dark:border-white/10 bg-white/90 dark:bg-[#050816]/90 backdrop-blur-xl px-6 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-4">
        <a href="feed.html" class="px-4 py-2 rounded-2xl soft-card text-xs font-black tracking-wider text-slate-500 hover:text-broblue transition-colors">← BACK TO FEED</a>
        <div>
          <span class="text-[10px] font-black tracking-[0.25em] uppercase text-brogreen block">SECURE CHAT PROTOCOL</span>
          <h1 class="text-xl font-black">Direct Messages</h1>
        </div>
      </div>
        <button id="theme-toggle" class="w-10 h-10 rounded-xl soft-card flex items-center justify-center text-sm" style="display:none;">🌓</button>
    </div>
  </header>

  <div class="flex-1 max-w-7xl w-full mx-auto p-4 lg:p-6 flex gap-6 overflow-hidden max-h-[calc(100vh-88px)]">
    
    <aside class="w-80 panel rounded-3xl flex flex-col overflow-hidden shadow-xl hidden md:flex">
      <div class="p-4 border-b border-slate-100 dark:border-white/5 space-y-3 bg-slate-50/50 dark:bg-[#050816]/30">
        <div class="flex items-center justify-between">
          <span class="text-xs font-black uppercase tracking-wider text-slate-400">Conversations</span>
          <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span>
        </div>
        <div class="relative">
          <input type="text" placeholder="Filter handle..." class="w-full px-4 py-2 rounded-xl bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 outline-none text-xs font-semibold focus:border-broblue transition-colors" />
        </div>
      </div>

      <div id="dm-user-list" class="flex-1 overflow-y-auto p-3 space-y-1.5 scrollbar-hide">
        </div>
    </aside>

    <main class="flex-1 panel rounded-3xl flex flex-col overflow-hidden shadow-xl relative">
      
      <div id="active-chat-header" class="px-6 py-4 border-b border-slate-100 dark:border-white/5 flex items-center justify-between bg-slate-50/50 dark:bg-[#050816]/30">
        </div>

      <div id="dm-chat" class="flex-1 p-6 overflow-y-auto space-y-4 bg-slate-50/20 dark:bg-transparent">
        </div>

      <form id="dm-form" class="p-4 border-t border-slate-100 dark:border-white/5 bg-white dark:bg-[#050816] flex gap-3 items-center">
        <input id="dm-input" class="flex-1 px-4 py-3.5 rounded-2xl bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 outline-none text-sm font-semibold tracking-wide placeholder:text-slate-400 focus:bg-white dark:focus:bg-white/10 focus:border-broblue transition-all" placeholder="Write a secure transmission..." autocomplete="off" />
        <button type="submit" class="px-6 py-3.5 rounded-2xl bg-brogreen text-black font-black uppercase tracking-wider text-xs shadow-md hover:opacity-95 transition-all transform active:scale-95">
          Transmit
        </button>
      </form>
    </main>

  </div>

  <script>
    // Removed theme toggling logic

    // Mock Live Network State Mock Data
    const users = [
      { name: "wallstreetwolf", avatar: "WW", sub: "Letting the winners run.", status: "online" },
      { name: "siegrinder", avatar: "SG", sub: "Covered calls make sense until...", status: "online" },
      { name: "cap_table_king", avatar: "CK", sub: "Own more than you sell.", status: "idle" },
      { name: "exceladdict", avatar: "EA", sub: "Know your DCF and comps cold.", status: "offline" }
    ];

    const messages = {
      wallstreetwolf: [
        { from: "me", text: "Hey, what are your thoughts on $NVDA?" },
        { from: "them", text: "Letting the winners run. Gravity got laid off!" }
      ],
      siegrinder: [
        { from: "me", text: "How's the Series 7 grind?" },
        { from: "them", text: "Covered calls make sense until the exam starts yelling." }
      ],
      cap_table_king: [
        { from: "me", text: "Any founder tips?" },
        { from: "them", text: "Own more than you sell." }
      ],
      exceladdict: [
        { from: "me", text: "Got a superday for an analyst role. Advice?" },
        { from: "them", text: "Know your DCF and comps cold." }
      ]
    };

    let activeUser = users[0].name;

    // Render User Sidebar Track Roster
    function renderUserList() {
      document.getElementById('dm-user-list').innerHTML = users.map(u => {
        const isCurrent = u.name === activeUser;
        const stateColor = u.status === 'online' ? 'bg-emerald-500' : (u.status === 'idle' ? 'bg-amber-400' : 'bg-slate-400');
        
        return `
          <button class="w-full flex items-center gap-3 p-3 rounded-2xl text-left transition-all relative ${isCurrent ? 'bg-brogreen text-black font-black shadow-lg shadow-brogreen/10' : 'soft-card hover:bg-slate-100 dark:hover:bg-white/5 text-slate-700 dark:text-slate-200'}" onclick="setActiveUser('${u.name}')">
            <div class="relative flex-shrink-0">
              <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(u.avatar)}&background=050816&color=B6FF22" class="w-10 h-10 rounded-full border-2 ${isCurrent ? 'border-black' : 'border-transparent'}" alt="">
              <span class="absolute bottom-0 right-0 w-3 h-3 rounded-full border-2 ${isCurrent ? 'border-brogreen' : 'border-white dark:border-[#050816]'} ${stateColor}"></span>
            </div>
            <div class="overflow-hidden flex-1">
              <div class="text-sm font-black truncate">@${u.name}</div>
              <div class="text-[11px] font-medium truncate ${isCurrent ? 'text-black/70' : 'text-slate-400'}">${u.sub}</div>
            </div>
          </button>
        `;
      }).join('');
    }

    // Render Chat Content Stream Panel View Frame
    function renderChat() {
      const activeData = users.find(u => u.name === activeUser);
      const chat = messages[activeUser] || [];

      // Render Dynamic Frame Workspace Header Context Elements
      document.getElementById('active-chat-header').innerHTML = `
        <div class="flex items-center gap-3">
          <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(activeData.avatar)}&background=050816&color=B6FF22" class="w-10 h-10 rounded-full" alt="">
          <div>
            <h3 class="text-sm font-black tracking-wide">@${activeData.name}</h3>
            <p class="text-[11px] text-slate-400 font-semibold uppercase tracking-wider">${activeData.status} session frame</p>
          </div>
        </div>
        <div class="text-xs soft-card px-3 py-1.5 rounded-xl font-bold text-slate-400 uppercase tracking-widest">P2P ENCRYPTED</div>
      `;

      // Render Primary Dialogue Array Line Matrix Bubble Groups
      document.getElementById('dm-chat').innerHTML = chat.map(m => {
        const isMe = m.from === 'me';
        return `
          <div class="flex w-full ${isMe ? 'justify-end' : 'justify-start'} animate-[fadeIn_0.2s_ease-out]">
            <div class="max-w-[75%] rounded-2xl px-4 py-3 text-sm font-semibold tracking-wide shadow-sm leading-relaxed ${
              isMe 
                ? 'bg-brogreen text-black rounded-tr-sm font-bold' 
                : 'bg-white border border-slate-200/60 dark:border-transparent dark:bg-[#111827] text-slate-800 dark:text-slate-100 rounded-tl-sm'
            }">
              ${m.text}
            </div>
          </div>
        `;
      }).join('');

      // Slide and scroll anchor down container to clear frames visibility
      const chatPane = document.getElementById('dm-chat');
      setTimeout(() => { chatPane.scrollTop = chatPane.scrollHeight; }, 10);
    }

    // Controller Wire Frame Bind Linkage Actions
    window.setActiveUser = function(name) {
      activeUser = name;
      renderUserList();
      renderChat();
    }

    // Capture Output Dispatch Network Message Hooks
    document.getElementById('dm-form').onsubmit = function(e) {
      e.preventDefault();
      const input = document.getElementById('dm-input');
      const text = input.value.trim();
      if (!text) return;

      messages[activeUser] = messages[activeUser] || [];
      messages[activeUser].push({ from: 'me', text });
      input.value = '';
      
      renderChat();
    };

    // Bootstrap App Setup Configurations
    renderUserList();
    renderChat();
  </script>
</body>
</html>
