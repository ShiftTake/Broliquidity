<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Bro Liquidity</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="bg-[#050816] text-white font-sans flex items-center justify-center min-h-screen">
  <div class="w-full max-w-md p-8 rounded-2xl glass shadow-lg">
    <h2 class="text-3xl font-black mb-6 text-center">Login</h2>
    <form id="login-form" class="flex flex-col gap-3">
      <input id="login-email" type="email" placeholder="Email" class="px-5 py-3 rounded-2xl bg-white text-black outline-none font-semibold w-full" required>
      <input id="login-password" type="password" placeholder="Password" class="px-5 py-3 rounded-2xl bg-white text-black outline-none font-semibold w-full" required>
      <button id="login-btn" type="submit" class="w-full px-4 py-3 rounded-2xl bg-blue-600 text-white font-bold hover:scale-105 transition">Login</button>
      <div id="login-error" class="text-red-400 text-sm mt-2 hidden"></div>
    </form>
    <div class="mt-6 text-center text-slate-400 text-sm">
      Don't have an account? <a href="register.html" class="text-[#b6ff22] underline">Create one</a>
    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDd5tPj3G8Emnga-svWIASzojete6vogH0",
      authDomain: "broliquidity.firebaseapp.com",
      projectId: "broliquidity",
      storageBucket: "broliquidity.appspot.com",
      messagingSenderId: "786880915771",
      appId: "1:786880915771:web:fe103176ffde52eff06f1e",
      measurementId: "G-SBMVSQ34L6"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const loginForm = document.getElementById('login-form');
    const emailInput = document.getElementById('login-email');
    const passwordInput = document.getElementById('login-password');
    const loginError = document.getElementById('login-error');

    function showLoginError(msg) {
      loginError.textContent = msg;
      loginError.classList.remove('hidden');
    }
    function clearLoginError() {
      loginError.textContent = '';
      loginError.classList.add('hidden');
    }

    loginForm.onsubmit = async (e) => {
      e.preventDefault();
      clearLoginError();
      try {
        await auth.signInWithEmailAndPassword(emailInput.value, passwordInput.value);
        window.location.href = 'index.html#community';
      } catch (err) {
        showLoginError('Login failed: ' + err.message);
      }
    };
  </script>
</body>
</html>
